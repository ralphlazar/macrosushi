<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>macrosushi - {{SUBJECT}}</title>
  <meta name="description" content="3 fresh pieces on the global economy, every weekday." />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; font-family: 'DM Sans', sans-serif; }
    .page { max-width: 440px; margin: 0 auto; padding: 3rem 1.5rem; text-align: center; }
    .logo { font-size: 22px; font-weight: 300; color: #bbb; letter-spacing: 0.02em; margin-bottom: 4px; }
    .logo span { color: #c9684a; }
    .tagline { font-size: 12px; color: #bbb; margin-bottom: 3rem; font-weight: 300; }
    .pieces { display: flex; flex-direction: column; margin-bottom: 3.5rem; }
    .piece { padding: 1.75rem 0; border-top: 0.5px solid #eee; display: flex; flex-direction: column; align-items: center; gap: 0.6rem; text-align: center; }
    .piece:last-child { border-bottom: 0.5px solid #eee; }
    .pip { width: 9px; height: 9px; border-radius: 50%; background: #c9684a; flex-shrink: 0; opacity: 0.6; }
    .piece-text { font-size: 15px; color: #1a1a1a; line-height: 1.75; font-weight: 300; }
    .get-these { font-size: 13px; color: #888; margin-bottom: 1rem; }
    .subscribe-form { margin-bottom: 3rem; }
    .subscribe-form input {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 300;
      color: #1a1a1a;
      text-align: center;
      border: none;
      border-bottom: 1px solid #eee;
      outline: none;
      padding: 0.5rem 0;
      width: 220px;
      margin-bottom: 12px;
      background: transparent;
    }
    .subscribe-form input::placeholder { color: #ccc; }
    .subscribe-form button {
      display: block;
      margin: 0 auto;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 300;
      color: #c9684a;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }
    .subscribe-form button:hover { opacity: 0.7; }
    .subscribe-form button:disabled { opacity: 0.4; cursor: default; }
    .sub-msg { font-size: 12px; color: #888; margin-top: 12px; min-height: 1.2em; }
    .anti-scroll { font-size: 11px; color: #bbb; margin-bottom: 2.5rem; }
    .footer { font-size: 11px; color: #ccc; }
    .footer a { color: #c9684a; text-decoration: none; opacity: 0.8; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="page">
    <div class="logo">macro<span>sushi</span></div>
    <div class="tagline">3 fresh pieces, every weekday.</div>

    <div class="pieces">
      <div class="piece">
        <div class="pip"></div>
        <div class="piece-text">{{PIECE_1}}</div>
      </div>
      <div class="piece">
        <div class="pip"></div>
        <div class="piece-text">{{PIECE_2}}</div>
      </div>
      <div class="piece">
        <div class="pip"></div>
        <div class="piece-text">{{PIECE_3}}</div>
      </div>
    </div>

    <div class="get-these">yum, yes please</div>
    <div class="subscribe-form">
      <input type="email" id="sub-email" placeholder="your email" autocomplete="email" />
      <button id="sub-btn">subscribe &rarr;</button>
      <div class="sub-msg" id="sub-msg"></div>
    </div>

    <div class="anti-scroll">that's it. off you go.</div>
    <div class="footer">powered by <a href="https://macrosnaps.app" target="_blank">macrosnaps</a></div>
  </div>

  <script>
    var btn = document.getElementById('sub-btn');
    var input = document.getElementById('sub-email');
    var msg = document.getElementById('sub-msg');

    btn.addEventListener('click', subscribe);
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') subscribe();
    });

    async function subscribe() {
      var email = input.value.trim();
      if (!email) return;

      btn.disabled = true;
      btn.textContent = '...';
      msg.textContent = '';

      try {
        var r = await fetch('/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email })
        });
        var data = await r.json();
        if (data.ok) {
          msg.textContent = "you're in. see you tomorrow.";
          input.value = '';
        } else {
          msg.textContent = data.error || "hmm, that didn't work.";
        }
      } catch (e) {
        msg.textContent = "hmm, that didn't work.";
      }

      btn.disabled = false;
      btn.textContent = 'subscribe \u2192';
    }
  </script>
</body>
</html>
