<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>macrosushi - editor</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --salmon: #c9684a;
      --salmon-light: rgba(201, 104, 74, 0.08);
      --salmon-mid: rgba(201, 104, 74, 0.18);
      --grey: #bbb;
      --grey-light: #f5f5f5;
      --rule: #eee;
      --text: #1a1a1a;
      --text-mid: #888;
    }

    body {
      background: #fafafa;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      color: var(--text);
      min-height: 100vh;
    }

    /* ---- header ---- */
    .header {
      background: #fff;
      border-bottom: 0.5px solid var(--rule);
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 18px;
      font-weight: 300;
      color: var(--grey);
      letter-spacing: 0.02em;
    }
    .logo span { color: var(--salmon); }
    .logo-tag {
      font-size: 11px;
      color: var(--grey);
      margin-left: 10px;
      letter-spacing: 0.08em;
      text-transform: lowercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .count-pill {
      font-size: 12px;
      color: var(--text-mid);
      background: var(--grey-light);
      padding: 4px 12px;
      border-radius: 20px;
      transition: all 0.2s;
    }
    .count-pill.ready {
      background: var(--salmon-light);
      color: var(--salmon);
    }

    .btn-publish {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 13px;
      color: #fff;
      background: var(--grey);
      border: none;
      padding: 8px 20px;
      border-radius: 20px;
      cursor: not-allowed;
      transition: all 0.25s;
      letter-spacing: 0.02em;
    }
    .btn-publish.active {
      background: var(--salmon);
      cursor: pointer;
    }
    .btn-publish.active:hover {
      opacity: 0.85;
    }

    /* ---- load screen ---- */
    .load-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 60px);
      gap: 1.5rem;
      text-align: center;
      padding: 2rem;
    }

    .load-screen p {
      font-size: 14px;
      color: var(--text-mid);
      line-height: 1.6;
    }

    .pip-large {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--salmon);
      opacity: 0.5;
      margin: 0 auto;
    }

    .btn-load {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 14px;
      color: var(--salmon);
      background: transparent;
      border: 0.5px solid var(--salmon);
      padding: 10px 24px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-load:hover {
      background: var(--salmon-light);
    }

    #file-input { display: none; }

    /* ---- subject line ---- */
    .subject-wrap {
      max-width: 680px;
      margin: 2rem auto 0;
      padding: 0 2rem;
    }

    .subject-label {
      font-size: 10px;
      color: var(--grey);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .subject-input {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 15px;
      color: var(--text);
      background: #fff;
      border: 0.5px solid var(--rule);
      border-radius: 6px;
      padding: 10px 14px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }
    .subject-input:focus {
      border-color: var(--salmon);
    }

    /* ---- pieces grid ---- */
    .main {
      max-width: 680px;
      margin: 0 auto;
      padding: 1.5rem 2rem 4rem;
    }

    .section-label {
      font-size: 10px;
      color: var(--grey);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      background: #fff;
      border: 0.5px solid var(--rule);
      border-radius: 8px;
      padding: 1.4rem 1.6rem 1.4rem 1.2rem;
      cursor: pointer;
      transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      position: relative;
    }

    .card:hover {
      border-color: #ddd;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }

    .card.selected {
      border-color: var(--salmon);
      background: var(--salmon-light);
    }

    .card-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding-top: 3px;
      flex-shrink: 0;
    }

    .card-pip {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--rule);
      transition: background 0.18s;
      flex-shrink: 0;
    }
    .card.selected .card-pip {
      background: var(--salmon);
      opacity: 0.7;
    }

    .card-num {
      font-size: 10px;
      color: var(--grey);
      letter-spacing: 0.05em;
    }

    .card-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.75;
      font-weight: 300;
      flex: 1;
      outline: none;
      border: none;
      background: transparent;
      resize: none;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      min-height: 48px;
    }
    .card-text:focus {
      cursor: text;
    }

    .card-badge {
      position: absolute;
      top: 10px;
      right: 12px;
      font-size: 10px;
      color: var(--salmon);
      letter-spacing: 0.08em;
      opacity: 0;
      transition: opacity 0.18s;
    }
    .card.selected .card-badge {
      opacity: 1;
    }

    /* ---- hint ---- */
    .hint {
      font-size: 12px;
      color: var(--grey);
      text-align: center;
      margin-top: 2rem;
      line-height: 1.6;
    }

    /* ---- toast ---- */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: #fff;
      font-size: 13px;
      font-weight: 300;
      padding: 10px 20px;
      border-radius: 20px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <div class="header">
    <div style="display:flex;align-items:baseline;gap:6px;">
      <div class="logo">macro<span>sushi</span></div>
      <div class="logo-tag">editor</div>
    </div>
    <div class="header-right">
      <div class="count-pill" id="count-pill">0 of 3 selected</div>
      <button class="btn-publish" id="btn-publish" disabled>publish</button>
    </div>
  </div>

  <!-- load screen -->
  <div class="load-screen" id="load-screen">
    <div class="pip-large"></div>
    <p>load today's drafts to begin.<br><span style="font-size:11px;color:#ccc;">e.g. drafts_2026-04-13.json</span></p>
    <button class="btn-load" id="btn-load">load drafts.json &rarr;</button>
    <input type="file" id="file-input" accept=".json" />
  </div>

  <!-- subject + cards (hidden until loaded) -->
  <div id="editor-ui" style="display:none;">
    <div class="subject-wrap">
      <div class="subject-label">subject line</div>
      <input class="subject-input" id="subject-input" type="text" />
    </div>

    <div class="main">
      <div class="section-label" style="margin-top:1.5rem;">drafts - pick three</div>
      <div class="cards" id="cards"></div>
      <div class="hint" id="hint">click a card to select it. click the text to edit it.</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const state = {
      pieces: [],
      selected: new Set()
    };

    // ---- file load ----
    document.getElementById('btn-load').addEventListener('click', () => {
      document.getElementById('file-input').click();
    });

    document.getElementById('file-input').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!data.pieces || data.pieces.length !== 6) {
            showToast('unexpected format - need 6 pieces');
            return;
          }
          loadDrafts(data);
        } catch {
          showToast('could not parse json');
        }
      };
      reader.readAsText(file);
    });

    function loadDrafts(data) {
      state.pieces = data.pieces.map(p => p.text);
      state.selected = new Set();

      document.getElementById('subject-input').value = data.subject || '';
      document.getElementById('load-screen').style.display = 'none';
      document.getElementById('editor-ui').style.display = 'block';

      renderCards();
      updateUI();
    }

    // ---- cards ----
    function renderCards() {
      const container = document.getElementById('cards');
      container.innerHTML = '';

      state.pieces.forEach((text, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.index = i;

        card.innerHTML = `
          <div class="card-left">
            <div class="card-pip"></div>
            <div class="card-num">${i + 1}</div>
          </div>
          <textarea class="card-text" rows="3" spellcheck="true">${text}</textarea>
          <div class="card-badge">selected</div>
        `;

        const textarea = card.querySelector('.card-text');

        // auto-resize textarea
        function resize() {
          textarea.style.height = 'auto';
          textarea.style.height = textarea.scrollHeight + 'px';
        }
        textarea.addEventListener('input', () => {
          state.pieces[i] = textarea.value;
          resize();
        });
        setTimeout(resize, 0);

        // clicking the card (not text) toggles selection
        card.addEventListener('click', e => {
          if (e.target === textarea) return;
          toggleSelect(i);
        });

        // clicking the textarea focuses it but doesn't toggle
        textarea.addEventListener('click', e => {
          e.stopPropagation();
        });

        container.appendChild(card);
      });
    }

    function toggleSelect(i) {
      if (state.selected.has(i)) {
        state.selected.delete(i);
      } else {
        if (state.selected.size >= 3) {
          showToast('deselect one first');
          return;
        }
        state.selected.add(i);
      }
      updateUI();
    }

    function updateUI() {
      const count = state.selected.size;
      const ready = count === 3;

      // cards
      document.querySelectorAll('.card').forEach(card => {
        const i = parseInt(card.dataset.index);
        card.classList.toggle('selected', state.selected.has(i));
      });

      // pill
      const pill = document.getElementById('count-pill');
      pill.textContent = `${count} of 3 selected`;
      pill.classList.toggle('ready', ready);

      // publish button
      const btn = document.getElementById('btn-publish');
      btn.disabled = !ready;
      btn.classList.toggle('active', ready);

      // hint
      const hint = document.getElementById('hint');
      if (ready) {
        hint.textContent = 'looking good. hit publish when you are ready.';
      } else {
        hint.textContent = 'click a card to select it. click the text to edit it.';
      }
    }

    // ---- publish ----
    document.getElementById('btn-publish').addEventListener('click', async () => {
      if (state.selected.size !== 3) return;

      const today = new Date().toISOString().split('T')[0];
      const subject = document.getElementById('subject-input').value.trim();
      const pieces = [...state.selected]
        .sort((a, b) => a - b)
        .map(i => ({ text: state.pieces[i] }));

      const output = { subject, pieces };

      try {
        const res = await fetch('/publish', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(output)
        });
        const data = await res.json();
        if (data.ok) {
          showToast(`saved: ${data.file}`);
        } else {
          showToast('publish failed - check terminal');
        }
      } catch {
        showToast('could not reach server - is server.py running?');
      }
    });

    // ---- toast ----
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
